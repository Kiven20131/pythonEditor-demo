<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Python Editor</title>

<style>

body{
    background:#0f172a;
    color:#e2e8f0;
    margin:0;
    display:flex;
    flex-direction:column;
    height:100vh;
}

h1{
    text-align:center;
    color:lightblue;
}

.container{
    display:flex;
    flex:1;
    gap:10px;
    padding:10px;
    min-height: 0;
    height:100%;
}

.left-panel{
    flex:1;
    display:flex;
    flex-direction:column;
    gap:10px;
    min-height:0;
}

#editor{
    flex:3;
    border:1px solid #334155;
    border-radius:8px;
    min-height:0;
}

#user_input{
    flex:1;
    background:#020617;
    color:#e2e8f0;
    border:1px solid #334155;
    padding:10px;
    font-family:monospace;
    border-radius:8px;
}

#output{
    flex:2;
    background:#020617;
    border:1px solid #334155;
    padding:10px;
    border-radius:8px;
    overflow:auto;
    white-space:pre-wrap;
    min-height:0;
}

.controls{
    padding:10px;
    border-top:1px solid #1e293b;
}

button{
    background:#2563eb;
    border:none;
    color:white;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>

</head>
<body>

<h1>Start Coding With Kiven Editorem </h1>

<form method="post" id="codeForm" class="container">

<div class="left-panel">

<div id="editor"></div>

<textarea id="hidden_code" name="code" hidden></textarea>

<textarea name="user_input" id="user_input"
placeholder="Program input">{{ user_input or "" }}</textarea>

</div>

<div id="output">{{ output }}</div>

</form>

<div class="controls">

<button type="button" onclick="runCode()">Run</button>

<button type="button" onclick="clearOutput()">Clear Output</button>

<button type="button" onclick="clearInput()">Clear Input</button>

</div>

<script>

let editor;

// Safe initial value from Flask
const initialCode = {{ (code or "# Write Python code\nprint('Hello')") | tojson }};

// Monaco loader
require.config({
paths:{
vs:"https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs"
}
});

require(["vs/editor/editor.main"], function(){

editor = monaco.editor.create(document.getElementById("editor"),{

value: initialCode,

language:"python",

theme:"vs-dark",

automaticLayout:true,

fontSize:14,

minimap:{enabled:true}

});
setTimeout(()=>{
    editor.layout();
},100);
});


// Run function
function runCode(){

const code = editor.getValue();

document.getElementById("hidden_code").value = code;

document.getElementById("codeForm").submit();

}

function clearOutput(){

document.getElementById("output").innerText="";

}

function clearInput(){

document.getElementById("user_input").value="";

}

</script>

</body>
</html>
